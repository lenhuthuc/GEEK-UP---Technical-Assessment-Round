version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: concert-postgres
    environment:
      POSTGRES_DB: concert_booking
      POSTGRES_USER: concert_user
      POSTGRES_PASSWORD: concert_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concert_user -d concert_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: concert-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
